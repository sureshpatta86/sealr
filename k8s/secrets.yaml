apiVersion: v1
kind: Secret
metadata:
  name: sealr-secrets
  namespace: sealr
type: Opaque
stringData:
  DATABASE_URL: "mssql+aioodbc://sa:REPLACE_ME@sqlserver-service:1433/SealrDB?driver=ODBC+Driver+18+for+SQL+Server&TrustServerCertificate=yes"
  ENCRYPTION_KEY: "REPLACE_WITH_BASE64_32_BYTE_KEY"
  OPENAI_API_KEY: "REPLACE_ME"
  ANTHROPIC_API_KEY: "REPLACE_ME"
  S3_ACCESS_KEY: "REPLACE_ME"
  S3_SECRET_KEY: "REPLACE_ME"
  GITHUB_WEBHOOK_SECRET: "REPLACE_ME"
