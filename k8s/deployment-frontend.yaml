apiVersion: apps/v1
kind: Deployment
metadata:
  name: sealr-frontend
  namespace: sealr
  labels:
    app: sealr-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sealr-frontend
  template:
    metadata:
      labels:
        app: sealr-frontend
    spec:
      containers:
        - name: frontend
          image: sealr-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://sealr.example.com"
            - name: NEXT_PUBLIC_WS_URL
              value: "wss://sealr.example.com"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: sealr
spec:
  selector:
    app: sealr-frontend
  ports:
    - port: 3000
      targetPort: 3000
