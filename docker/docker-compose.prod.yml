version: "3.8"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sealr-sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${DB_PASSWORD:-Sealr@Prod456}"
      MSSQL_PID: "Developer"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${DB_PASSWORD:-Sealr@Prod456}" -C -Q "SELECT 1" || exit 1
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    networks:
      - sealr-network

  redis:
    image: redis:7-alpine
    container_name: sealr-redis
    restart: unless-stopped
    command: redis-server --requirepass "${REDIS_PASSWORD:-sealr_redis_prod}"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-sealr_redis_prod}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    networks:
      - sealr-network

  minio:
    image: minio/minio
    container_name: sealr-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_USER:-sealr}"
      MINIO_ROOT_PASSWORD: "${MINIO_PASSWORD:-sealr_minio_prod}"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    networks:
      - sealr-network

  backend:
    image: sealr-backend:latest
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: sealr-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: "mssql+aioodbc://sa:${DB_PASSWORD:-Sealr@Prod456}@sqlserver:1433/sealr?driver=ODBC+Driver+18+for+SQL+Server&TrustServerCertificate=yes"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-sealr_redis_prod}@redis:6379/0"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "${MINIO_USER:-sealr}"
      MINIO_SECRET_KEY: "${MINIO_PASSWORD:-sealr_minio_prod}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      GITHUB_APP_PRIVATE_KEY: "${GITHUB_APP_PRIVATE_KEY}"
      AES_ENCRYPTION_KEY: "${AES_ENCRYPTION_KEY}"
      ENVIRONMENT: "production"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    networks:
      - sealr-network

  celery-worker:
    image: sealr-backend:latest
    container_name: sealr-celery-worker
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: "mssql+aioodbc://sa:${DB_PASSWORD:-Sealr@Prod456}@sqlserver:1433/sealr?driver=ODBC+Driver+18+for+SQL+Server&TrustServerCertificate=yes"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-sealr_redis_prod}@redis:6379/0"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "${MINIO_USER:-sealr}"
      MINIO_SECRET_KEY: "${MINIO_PASSWORD:-sealr_minio_prod}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      GITHUB_APP_PRIVATE_KEY: "${GITHUB_APP_PRIVATE_KEY}"
      AES_ENCRYPTION_KEY: "${AES_ENCRYPTION_KEY}"
      ENVIRONMENT: "production"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    networks:
      - sealr-network

  celery-beat:
    image: sealr-backend:latest
    container_name: sealr-celery-beat
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: "mssql+aioodbc://sa:${DB_PASSWORD:-Sealr@Prod456}@sqlserver:1433/sealr?driver=ODBC+Driver+18+for+SQL+Server&TrustServerCertificate=yes"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-sealr_redis_prod}@redis:6379/0"
      ENVIRONMENT: "production"
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    networks:
      - sealr-network

  frontend:
    image: sealr-frontend:latest
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: sealr-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: "/api"
      NEXT_PUBLIC_WS_URL: ""
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    networks:
      - sealr-network

  nginx:
    image: nginx:alpine
    container_name: sealr-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    networks:
      - sealr-network

volumes:
  sqlserver-data:
  redis-data:
  minio-data:

networks:
  sealr-network:
    driver: bridge
