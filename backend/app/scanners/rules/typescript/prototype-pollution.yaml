rules:
  - id: ts-prototype-pollution-merge
    pattern: Object.assign($TARGET, $INPUT, ...)
    message: "Object.assign with user-controlled input may lead to prototype pollution"
    severity: WARNING
    languages: [typescript, javascript]
    metadata:
      category: injection
      cwe: "CWE-1321"
      auto_fixable: false

  - id: ts-prototype-pollution-bracket
    pattern: $OBJ[$KEY] = $VALUE
    message: "Dynamic property assignment may lead to prototype pollution if key is user-controlled — validate key is not '__proto__', 'constructor', or 'prototype'"
    severity: INFO
    languages: [typescript, javascript]
    metadata:
      category: injection
      cwe: "CWE-1321"
      auto_fixable: true
      fix_strategy: "Add key validation against __proto__, constructor, prototype"

  - id: ts-prototype-pollution-lodash-merge
    patterns:
      - pattern-either:
          - pattern: _.merge($TARGET, $INPUT)
          - pattern: _.defaultsDeep($TARGET, $INPUT)
    message: "Deep merge with user input can cause prototype pollution — use a safe merge utility"
    severity: WARNING
    languages: [typescript, javascript]
    metadata:
      category: injection
      cwe: "CWE-1321"
      auto_fixable: false
